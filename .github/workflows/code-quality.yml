name: Code quality

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Ruff
      run: |
        uv tool install ruff@0.15.12

    - name: Fix import order with Ruff
      env:
        REF_NAME: ${{ github.ref_name }}
      run: |
        ruff check src --select=I --fix

        if ! git diff --quiet; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "style: sort imports with ruff"
          git push origin "HEAD:$REF_NAME" || echo "Push rejected (branch protection?), skipping."
        fi

    # The UP ruleset is not used because I like using Optional[T] :)
    - name: Lint with Ruff
      run: |
        ruff check src --select=E,F,I,B,C4,SIM,PTH --ignore E501 --output-format=github

    - name: Format check with Ruff
      run: |
        ruff format --diff src --output-format=github

    - name: Type check with ty
      run: |
        uv sync
        uvx ty@0.0.33 check src
